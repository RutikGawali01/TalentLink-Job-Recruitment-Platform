server.port=${PORT:9090}

spring.application.name=Job-Portal-Backend
spring.data.mongodb.auto-index-creation=true
#spring.data.mongodb.uri=mongodb\://localhost\:27017/jobportal


spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/TalentLink}


#Email properties

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


# spring boot actuators

# these are for the spring boot actuators to track health and all feature of our system
management.endpoints.web.exposure.include=*

#disabled info endpoint with actuator
#management.endpoint.info.enabled=false

#actuator name is changed
management.endpoints.web.base-path=/manage-job-portal

USER_FOUND= User has registered already.
USER_NOT_FOUND=User is not registered.
INVALID_CREDENTIALS=Invalid Credential.
OTP_NOT_FOUND=OTP is expired.
OTP_INCORRECT=OTP is incorrect.

JOB_NOT_FOUND=Job not found.
JOB_APPLIED_ALREADY= job applied already.

#spring boot logging
#below works acc to log levels --
#all spring boot logs
#logging.level.root=TRACE

#only logs from this directory will be printed
logging.level.com.jobportal.Service=trace



groq.api.key=${GROQ_API_KEY}

openrouter.api.key=${OPENROUTER_API_KEY}

openrouter.api.url=${OPENROUTER_API_URL}